<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYROS Dashboard - Kodara</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            padding: 20px;
        }
        
        .container {
            max-width: 1800px;
            margin: 0 auto;
        }
        
        header {
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #888;
            font-size: 14px;
        }
        
        .date-range-selector {
            display: flex;
            gap: 10px;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        
        .date-btn {
            background: #2a2a2a;
            color: #fff;
            border: 2px solid #2a2a2a;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .date-btn:hover {
            border-color: #4a9eff;
        }
        
        .date-btn.active {
            background: #4a9eff;
            border-color: #4a9eff;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #2a2a2a;
        }
        
        .stat-label {
            color: #888;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #4a9eff;
        }
        
        .stat-subtext {
            color: #666;
            font-size: 11px;
            margin-top: 6px;
        }
        
        .section {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid #2a2a2a;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        h2 {
            font-size: 20px;
            font-weight: 600;
        }
        
        .badge {
            background: #2a2a2a;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            color: #888;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            text-align: left;
            padding: 12px;
            color: #888;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #2a2a2a;
            font-weight: 600;
        }
        
        td {
            padding: 16px 12px;
            border-bottom: 1px solid #1a1a1a;
            font-size: 13px;
        }
        
        tr:hover {
            background: #0f0f0f;
        }
        
        .number {
            font-family: 'Monaco', monospace;
            color: #4a9eff;
        }
        
        .currency {
            font-family: 'Monaco', monospace;
            color: #10b981;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #2a2a2a;
            border-top-color: #4a9eff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error {
            background: #ef4444;
            color: white;
            padding: 16px;
            border-radius: 8px;
            margin: 20px 0;
        }
        
        /* Tooltip styles */
        .tooltip-trigger {
            position: relative;
            cursor: help;
            border-bottom: 1px dashed #4a9eff;
        }
        
        .tooltip-trigger:hover {
            border-bottom-color: #6bb1ff;
        }
        
        .tooltip {
            position: absolute;
            background: #1a1a1a;
            border: 1px solid #4a9eff;
            border-radius: 8px;
            padding: 12px 16px;
            min-width: 250px;
            max-width: 400px;
            z-index: 1000;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            display: none;
            font-size: 12px;
            line-height: 1.6;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            margin-bottom: 8px;
        }
        
        .tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 6px solid transparent;
            border-top-color: #4a9eff;
        }
        
        .tooltip-trigger:hover .tooltip {
            display: block;
        }
        
        .tooltip-title {
            font-weight: 600;
            color: #4a9eff;
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid #2a2a2a;
        }
        
        .tooltip-email {
            color: #ccc;
            padding: 2px 0;
            word-break: break-all;
        }
        
        .tooltip-empty {
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>HYROS Dashboard</h1>
            <div class="subtitle">Scientific Attribution • Meta Ads Performance</div>
        </header>
        
        <div class="date-range-selector">
            <button class="date-btn" data-range="today">Today</button>
            <button class="date-btn" data-range="yesterday">Yesterday</button>
            <button class="date-btn active" data-range="last7days">Last 7 Days</button>
            <button class="date-btn" data-range="last14days">Last 14 Days</button>
            <button class="date-btn" data-range="mtd">Month to Date</button>
            <button class="date-btn" data-range="lastmonth">Last Month</button>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Calls</div>
                <div class="stat-value" id="total-calls">-</div>
                <div class="stat-subtext" id="date-range-text">Last 7 days</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Sales</div>
                <div class="stat-value" id="total-sales">-</div>
                <div class="stat-subtext">Scientific attribution</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Spend</div>
                <div class="stat-value currency" id="total-spend">-</div>
                <div class="stat-subtext">Meta Ads</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Cost per Call</div>
                <div class="stat-value currency" id="avg-cost-per-call">-</div>
                <div class="stat-subtext">Avg across adsets</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Cost per Sale</div>
                <div class="stat-value currency" id="avg-cost-per-sale">-</div>
                <div class="stat-subtext">Avg across adsets</div>
            </div>
        </div>
        
        <div class="section">
            <div class="section-header">
                <h2>Ad Set Performance</h2>
                <span class="badge" id="adset-count">Loading...</span>
            </div>
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <div style="margin-top: 10px;">Loading attribution data...</div>
            </div>
            <div id="error"></div>
            <div id="adset-table"></div>
        </div>
    </div>
    
    <script>
        let currentRange = 'last7days';
        
        function formatCurrency(value) {
            if (!value && value !== 0) return '-';
            return '$' + parseFloat(value).toFixed(2);
        }
        
        function formatNumber(value) {
            if (!value && value !== 0) return '-';
            return parseFloat(value).toFixed(0);
        }
        
        function createTooltip(emails, type) {
            if (!emails || emails.length === 0) {
                return `<div class="tooltip">
                    <div class="tooltip-title">${type}</div>
                    <div class="tooltip-empty">No ${type.toLowerCase()} in this period</div>
                </div>`;
            }
            
            const emailList = emails.map(email => 
                `<div class="tooltip-email">${email}</div>`
            ).join('');
            
            return `<div class="tooltip">
                <div class="tooltip-title">${type} (${emails.length})</div>
                ${emailList}
            </div>`;
        }
        
        function getRangeLabel(range) {
            const labels = {
                'today': 'Today',
                'yesterday': 'Yesterday',
                'last7days': 'Last 7 days',
                'last14days': 'Last 14 days',
                'mtd': 'Month to date',
                'lastmonth': 'Last month'
            };
            return labels[range] || range;
        }
        
        async function loadData() {
            const loading = document.getElementById('loading');
            const errorDiv = document.getElementById('error');
            const tableDiv = document.getElementById('adset-table');
            const adsetCount = document.getElementById('adset-count');
            
            loading.style.display = 'block';
            errorDiv.innerHTML = '';
            tableDiv.innerHTML = '';
            
            document.getElementById('date-range-text').textContent = getRangeLabel(currentRange);
            
            try {
                const response = await fetch(`/api/attribution-report?range=${currentRange}`);
                const data = await response.json();
                
                loading.style.display = 'none';
                
                if (!data.result) {
                    throw new Error('Invalid response from API');
                }
                
                const adsets = data.result;
                adsetCount.textContent = `${adsets.length} ad sets`;
                
                // Calculate totals
                let totalCalls = 0;
                let totalSales = 0;
                let totalSpend = 0;
                let totalCostPerCall = 0;
                let totalCostPerSale = 0;
                let countWithCalls = 0;
                let countWithSales = 0;
                
                adsets.forEach(adset => {
                    totalCalls += adset.calls || 0;
                    totalSales += adset.sales || 0;
                    totalSpend += adset.cost || 0;
                    if (adset.cost_per_call) {
                        totalCostPerCall += adset.cost_per_call;
                        countWithCalls++;
                    }
                    if (adset.cost_per_sale) {
                        totalCostPerSale += adset.cost_per_sale;
                        countWithSales++;
                    }
                });
                
                document.getElementById('total-calls').textContent = formatNumber(totalCalls);
                document.getElementById('total-sales').textContent = formatNumber(totalSales);
                document.getElementById('total-spend').textContent = formatCurrency(totalSpend);
                document.getElementById('avg-cost-per-call').textContent = 
                    formatCurrency(countWithCalls > 0 ? totalCostPerCall / countWithCalls : 0);
                document.getElementById('avg-cost-per-sale').textContent = 
                    formatCurrency(countWithSales > 0 ? totalCostPerSale / countWithSales : 0);
                
                // Build table with tooltips
                const html = `
                    <table>
                        <thead>
                            <tr>
                                <th>Ad Set</th>
                                <th style="text-align: right;">Calls</th>
                                <th style="text-align: right;">Sales</th>
                                <th style="text-align: right;">Cost per Click</th>
                                <th style="text-align: right;">Cost per Call</th>
                                <th style="text-align: right;">Cost per Sale</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${adsets.map(adset => `
                                <tr>
                                    <td style="max-width: 400px; overflow: hidden; text-overflow: ellipsis;">${adset.name || adset.id}</td>
                                    <td style="text-align: right;">
                                        ${adset.calls > 0 ? `
                                            <span class="tooltip-trigger">
                                                <span class="number">${formatNumber(adset.calls)}</span>
                                                ${createTooltip(adset.callEmails, 'Calls')}
                                            </span>
                                        ` : `<span class="number">${formatNumber(adset.calls)}</span>`}
                                    </td>
                                    <td style="text-align: right;">
                                        ${adset.sales > 0 ? `
                                            <span class="tooltip-trigger">
                                                <span class="number">${formatNumber(adset.sales)}</span>
                                                ${createTooltip(adset.saleEmails, 'Sales')}
                                            </span>
                                        ` : `<span class="number">${formatNumber(adset.sales)}</span>`}
                                    </td>
                                    <td style="text-align: right;"><span class="currency">${formatCurrency(adset.cost_per_click)}</span></td>
                                    <td style="text-align: right;"><span class="currency">${formatCurrency(adset.cost_per_call)}</span></td>
                                    <td style="text-align: right;"><span class="currency">${formatCurrency(adset.cost_per_sale)}</span></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
                
                tableDiv.innerHTML = html;
            } catch (error) {
                loading.style.display = 'none';
                errorDiv.innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }
        
        // Date range selector
        document.querySelectorAll('.date-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentRange = btn.dataset.range;
                loadData();
            });
        });
        
        // Load initial data
        loadData();
        
        // Auto-refresh every 5 minutes
        setInterval(loadData, 300000);
    </script>
</body>
</html>
